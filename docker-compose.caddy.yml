services:
  cc-switch-web:
    build: .
    image: cc-switch-web:latest
    restart: unless-stopped
    environment:
      CC_SWITCH_WEB_HOST: 0.0.0.0
      CC_SWITCH_WEB_PORT: 3000
      CC_SWITCH_WEB_DATA_DIR: /data
      CC_SWITCH_WEB_STATIC_DIR: /app/dist
      CC_SWITCH_WEB_AUTH_TOKEN: ${CC_SWITCH_WEB_AUTH_TOKEN}
    volumes:
      - cc-switch-web-data:/data
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.gemini:/root/.gemini
      - ${HOME}/.config/opencode:/root/.config/opencode
      - ${HOME}/.openclaw:/root/.openclaw
      - ${HOME}/.hermes:/root/.hermes

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - cc-switch-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  cc-switch-web-data:
  caddy-data:
  caddy-config:
